name: Deploy to GitHub Pages

# Builds the Next.js static export and publishes out/ to GitHub Pages.
# Enable Pages in repo Settings → Pages → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs of the same group.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        # Use `npm install` rather than `npm ci`: a transitive optional
        # platform binding (@unrs/resolver-binding-wasm32-wasi → @emnapi/*)
        # resolves to different patch versions across platforms/npm versions,
        # which makes `npm ci` hard-fail (EUSAGE) on the Linux runner. `npm
        # install` honours the locked versions but tolerates that drift.
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Build static export
        env:
          # For a PROJECT site (https://<user>.github.io/<repo>) base_path is
          # "/<repo>"; configure-pages exposes it so links resolve correctly.
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
          NEXT_PUBLIC_SITE_URL: ${{ steps.pages.outputs.origin }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
